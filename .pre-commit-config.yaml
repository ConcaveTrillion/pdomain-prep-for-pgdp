repos:
-   repo: https://gitlab.com/vojko.pribudic.foss/pre-commit-update
    rev: v0.9.0
    hooks:
    -   id: pre-commit-update
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-json
-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.12
    hooks:
    # Run the linter for imports
    -   id: ruff-check
        args: [--select, I, --fix]
    # Automatically fix issues.
    -   id: ruff-check
        args: [--fix]
    # Run the formatter.
    -   id: ruff-format
-   repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
    -   id: markdownlint-cli2
    -   id: markdownlint-cli2
        alias: markdownlint-cli2-fix
        args: [--fix]
        stages: [manual]
-   repo: local
    hooks:
    -   id: frontend-tsc
        name: frontend tsc -b --noEmit
        description: TypeScript project-references type-check for the React SPA.
        entry: bash -c 'cd frontend && npx tsc -b --noEmit'
        language: system
        files: ^frontend/(src/.*\.(ts|tsx)|tsconfig.*\.json|package(-lock)?\.json|vite\.config\.ts)$
        pass_filenames: false
