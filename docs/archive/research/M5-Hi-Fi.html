<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

// ───────────────────────────────────────────────────────────────────────────
// data
// ───────────────────────────────────────────────────────────────────────────

const STAGES = ['ocr', 'classify', 'segment', 'normalize'];

function makePages() {
  // 47 pages with synthetic state distribution
  const out = [];
  for (let i = 1; i <= 47; i++) {
    const num = String(i).padStart(4, '0');
    let cells, status;
    if (i <= 28)            { cells = ['done','done','done','done']; status = 'done'; }
    else if (i === 29)      { cells = ['done','done','running','queued']; status = 'running'; }
    else if (i === 30)      { cells = ['done','running','queued','queued']; status = 'running'; }
    else if (i === 31)      { cells = ['running','queued','queued','queued']; status = 'running'; }
    else if (i === 32)      { cells = ['done','done','err','queued']; status = 'errored'; }
    else if (i === 33)      { cells = ['err','queued','queued','queued']; status = 'errored'; }
    else if (i === 34)      { cells = ['done','done','done','done']; status = 'review'; }
    else if (i === 35)      { cells = ['done','done','done','done']; status = 'review'; }
    else if (i === 36)      { cells = ['done','done','done','done']; status = 'review'; }
    else                    { cells = ['queued','queued','queued','queued']; status = 'queued'; }
    out.push({
      num,
      file: `scan_${num}.tif`,
      cells,
      status,
      durations: cells.map(c => c === 'done' ? (Math.random() * 14 + 4).toFixed(1) : '—'),
      startedAt: i <= 33 ? `${Math.max(1, 34-i)}m ago` : null,
    });
  }
  return out;
}

const PAGES = makePages();

const STATUS_META = {
  running:  { label: 'Running',  cls: 'bg-blue-50 text-blue-700 ring-blue-600/20',     dot: 'bg-blue-500'   },
  done:     { label: 'Done',     cls: 'bg-emerald-50 text-emerald-700 ring-emerald-600/20', dot: 'bg-emerald-500' },
  queued:   { label: 'Queued',   cls: 'bg-slate-50 text-slate-600 ring-slate-500/20',  dot: 'bg-slate-400'  },
  errored:  { label: 'Errored',  cls: 'bg-red-50 text-red-700 ring-red-600/20',        dot: 'bg-red-500'    },
  review:   { label: 'Review',   cls: 'bg-amber-50 text-amber-800 ring-amber-600/20',  dot: 'bg-amber-500'  },
  parked:   { label: 'Parked',   cls: 'bg-amber-50 text-amber-800 ring-amber-600/20',  dot: 'bg-amber-500'  },
};

const CELL_META = {
  done:    { cls: 'bg-emerald-50 text-emerald-700 ring-emerald-600/20', icon: 'check' },
  running: { cls: 'bg-blue-50 text-blue-700 ring-blue-600/20',          icon: 'loader-2' },
  queued:  { cls: 'bg-slate-50 text-slate-500 ring-slate-300',          icon: 'circle' },
  err:     { cls: 'bg-red-50 text-red-700 ring-red-600/20',             icon: 'x' },
};

// ───────────────────────────────────────────────────────────────────────────
// primitives
// ───────────────────────────────────────────────────────────────────────────

function Icon({ name, className = 'w-4 h-4', stroke = 2 }) {
  // Tiny inline SVG icon set — keeps it dependency-free
  const paths = {
    'bell': <><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>,
    'chevron-down': <polyline points="6 9 12 15 18 9"/>,
    'chevron-right': <polyline points="9 18 15 12 9 6"/>,
    'chevron-up': <polyline points="18 15 12 9 6 15"/>,
    'play': <polygon points="6 3 20 12 6 21 6 3"/>,
    'package': <><path d="m7.5 4.27 9 5.15"/><path d="M21 8 12 13 3 8"/><path d="M3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8Z"/><path d="M12 22V13"/></>,
    'refresh': <><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></>,
    'x': <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
    'check': <polyline points="20 6 9 17 4 12"/>,
    'circle': <circle cx="12" cy="12" r="4"/>,
    'loader-2': <><path d="M21 12a9 9 0 1 1-6.219-8.56"/></>,
    'alert-triangle': <><path d="M21.7 18 13.7 4a2 2 0 0 0-3.4 0L2.3 18a2 2 0 0 0 1.7 3h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>,
    'eye': <><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></>,
    'list-filter': <><path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/></>,
    'arrow-right': <><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>,
    'panel-right-close': <><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M15 3v18"/><path d="m10 15-3-3 3-3"/></>,
    'rotate-ccw': <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
    'logs': <><path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h12"/></>,
    'folder': <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/>,
    'circle-check': <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
    'search': <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
    'more-horizontal': <><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>,
  };
  return (
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
         className={className}>
      {paths[name] || null}
    </svg>
  );
}

function Badge({ kind = 'queued', children, className = '' }) {
  const meta = STATUS_META[kind] || STATUS_META.queued;
  return (
    <span className={`inline-flex items-center gap-1.5 rounded-md px-2 py-0.5 text-xs font-medium ring-1 ring-inset ${meta.cls} ${className}`}>
      <span className={`h-1.5 w-1.5 rounded-full ${meta.dot}`}></span>
      {children || meta.label}
    </span>
  );
}

function Button({ variant = 'default', size = 'default', className = '', children, ...rest }) {
  const base = 'inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-400 disabled:opacity-50 disabled:pointer-events-none';
  const variants = {
    default:   'bg-slate-900 text-white hover:bg-slate-800',
    secondary: 'bg-white text-slate-900 border border-slate-200 hover:bg-slate-50',
    outline:   'border border-slate-200 bg-white hover:bg-slate-50 text-slate-700',
    ghost:     'text-slate-700 hover:bg-slate-100',
    link:      'text-slate-900 underline-offset-4 hover:underline',
    amber:     'bg-amber-600 text-white hover:bg-amber-700',
    danger:    'bg-white text-red-700 border border-red-200 hover:bg-red-50',
  };
  const sizes = {
    default: 'h-9 px-3.5',
    sm:      'h-8 px-3 text-xs',
    xs:      'h-7 px-2.5 text-xs',
    icon:    'h-9 w-9',
  };
  return (
    <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...rest}>
      {children}
    </button>
  );
}

function Progress({ value, total, tone = 'default' }) {
  const pct = Math.max(0, Math.min(1, value / total)) * 100;
  const fill = {
    default: 'bg-slate-900',
    blue: 'bg-blue-500',
    red: 'bg-red-500',
    amber: 'bg-amber-500',
    emerald: 'bg-emerald-500',
  }[tone];
  return (
    <div className="flex items-center gap-2.5 min-w-[180px]">
      <div className="relative flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <div className={`absolute inset-y-0 left-0 ${fill} rounded-full transition-all`} style={{ width: pct + '%' }}></div>
      </div>
      <span className="font-mono text-xs text-slate-600 tabular-nums whitespace-nowrap">{value} / {total}</span>
    </div>
  );
}

// ───────────────────────────────────────────────────────────────────────────
// top nav with bell
// ───────────────────────────────────────────────────────────────────────────

function Bell({ unreviewed, onSelectPage }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    function onDoc(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  return (
    <div ref={ref} className="relative">
      <button
        onClick={() => setOpen(o => !o)}
        className="relative h-9 w-9 inline-flex items-center justify-center rounded-md text-slate-300 hover:text-white hover:bg-slate-800 transition-colors"
        aria-label="Open tasks"
      >
        <Icon name="bell" className="w-[18px] h-[18px]" stroke={1.75} />
        {unreviewed.length > 0 && (
          <span className="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 rounded-full bg-amber-500 text-[10px] font-semibold text-white flex items-center justify-center ring-2 ring-slate-900 tabular-nums">
            {unreviewed.length}
          </span>
        )}
      </button>
      {open && (
        <div className="absolute right-0 top-11 w-80 bg-white rounded-lg border border-slate-200 shadow-lg ring-1 ring-slate-900/5 z-50 overflow-hidden">
          <div className="px-3.5 py-2.5 border-b border-slate-100 flex items-center justify-between">
            <div>
              <div className="text-sm font-semibold text-slate-900">Open tasks</div>
              <div className="text-xs text-slate-500 mt-0.5">
                {unreviewed.length > 0
                  ? `${unreviewed.length} page${unreviewed.length===1?'':'s'} need review`
                  : 'Nothing to review'}
              </div>
            </div>
            <span className="text-[10px] font-mono text-slate-400 uppercase tracking-wider">M5</span>
          </div>
          {unreviewed.length === 0 ? (
            <div className="px-3.5 py-8 text-center">
              <div className="inline-flex items-center justify-center w-10 h-10 rounded-full bg-emerald-50 text-emerald-600 mb-2">
                <Icon name="circle-check" />
              </div>
              <div className="text-sm text-slate-700">All caught up</div>
              <div className="text-xs text-slate-500 mt-0.5">No pages awaiting review.</div>
            </div>
          ) : (
            <div className="max-h-80 overflow-y-auto scrollbar-thin">
              {unreviewed.map(p => (
                <div key={p.num} className="px-3.5 py-2.5 border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors flex items-center justify-between gap-3">
                  <div className="min-w-0">
                    <div className="text-sm font-medium text-slate-900">Page {p.num}</div>
                    <div className="text-xs font-mono text-slate-500 truncate">{p.file}</div>
                  </div>
                  <button
                    onClick={() => { setOpen(false); onSelectPage && onSelectPage(p); }}
                    className="text-xs font-medium text-slate-700 hover:text-slate-900 underline-offset-2 hover:underline whitespace-nowrap"
                  >
                    Review →
                  </button>
                </div>
              ))}
            </div>
          )}
          <div className="px-3.5 py-2 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
            <span className="text-xs text-slate-500">willa-cather-letters</span>
            <a href="#" className="text-xs font-medium text-slate-700 hover:text-slate-900">See all jobs →</a>
          </div>
        </div>
      )}
    </div>
  );
}

function TopNav({ unreviewed, onSelectPage }) {
  return (
    <header className="bg-slate-900 text-slate-100 border-b border-slate-800">
      <div className="px-6 h-14 flex items-center gap-6">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-md bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center text-slate-900 font-bold text-sm">p</div>
          <span className="font-semibold tracking-tight">pgdp-prep</span>
        </div>
        <nav className="flex items-center gap-1 text-sm">
          <a href="#" className="px-2.5 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800">Projects</a>
          <a href="#" className="px-2.5 py-1.5 rounded-md text-white bg-slate-800">willa-cather-letters</a>
          <a href="#" className="px-2.5 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800">Jobs</a>
          <a href="#" className="px-2.5 py-1.5 rounded-md text-slate-400 hover:text-white hover:bg-slate-800">Settings</a>
        </nav>
        <div className="flex-1"></div>
        <div className="hidden md:flex items-center gap-2 text-xs text-slate-400 px-2.5 py-1.5 rounded-md border border-slate-800 bg-slate-950/40 w-64">
          <Icon name="search" className="w-3.5 h-3.5" />
          <span>Search projects…</span>
          <span className="ml-auto font-mono text-[10px] text-slate-500">⌘K</span>
        </div>
        <Bell unreviewed={unreviewed} onSelectPage={onSelectPage} />
        <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-medium text-slate-100">M</div>
      </div>
    </header>
  );
}

// ───────────────────────────────────────────────────────────────────────────
// review banner (subtle / left-accent)
// ───────────────────────────────────────────────────────────────────────────

function ReviewBanner({ count, onReviewNext, onDismiss }) {
  if (count === 0) return null;
  return (
    <div className="bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden">
      <div className="flex items-center gap-3 pl-4 pr-3 py-3 border-l-4 border-amber-500">
        <Icon name="alert-triangle" className="w-5 h-5 text-amber-600 shrink-0" stroke={2} />
        <div className="flex-1 min-w-0">
          <div className="text-sm text-slate-900">
            <span className="font-semibold">{count} page{count === 1 ? '' : 's'} need review</span> before the package can build.
          </div>
          <div className="text-xs text-slate-500 mt-0.5">
            <code className="font-mono">build_package</code> is parked — it will resume automatically when the count reaches 0.
          </div>
        </div>
        <div className="flex items-center gap-1 shrink-0">
          <Button variant="default" size="sm" onClick={onReviewNext}>
            Review next page <Icon name="arrow-right" className="w-3.5 h-3.5" />
          </Button>
          <Button variant="ghost" size="icon" className="h-8 w-8" onClick={onDismiss} aria-label="Dismiss">
            <Icon name="x" className="w-4 h-4" />
          </Button>
        </div>
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────────────────────
// jobs row (parent) + page list (children) + filter + drawer
// ───────────────────────────────────────────────────────────────────────────

const FILTERS = [
  { id: 'all',     label: 'All' },
  { id: 'running', label: 'Running' },
  { id: 'queued',  label: 'Queued' },
  { id: 'done',    label: 'Done' },
  { id: 'errored', label: 'Errored' },
  { id: 'review',  label: 'Awaiting review' },
];

function StageCell({ kind }) {
  const m = CELL_META[kind];
  return (
    <span className={`inline-flex items-center justify-center w-5 h-5 rounded ring-1 ring-inset ${m.cls}`}
          title={kind}>
      <Icon name={m.icon} className="w-3 h-3" stroke={2.5} />
    </span>
  );
}

function PageRow({ page, selected, onClick }) {
  const m = STATUS_META[page.status];
  const doneCount = page.cells.filter(c => c === 'done').length;
  return (
    <button
      onClick={onClick}
      className={`w-full grid grid-cols-[1fr_180px_120px_110px_24px] items-center gap-4 px-5 py-2.5 border-b border-slate-100 text-left transition-colors ${selected ? 'row-active' : 'row-hover'}`}
    >
      <div className="min-w-0 flex items-center gap-3">
        <div className="w-1 h-6 rounded-full" style={{ background: selected ? '#0f172a' : 'transparent' }}></div>
        <div className="min-w-0">
          <div className="text-sm font-medium text-slate-900">Page {page.num}</div>
          <div className="text-xs font-mono text-slate-500 truncate">{page.file}</div>
        </div>
      </div>
      <div className="flex items-center gap-1">
        {page.cells.map((c, i) => <StageCell key={i} kind={c} />)}
      </div>
      <Progress value={doneCount} total={4} tone={page.status === 'errored' ? 'red' : page.status === 'running' ? 'blue' : 'emerald'} />
      <Badge kind={page.status} />
      <Icon name="chevron-right" className="w-4 h-4 text-slate-400" />
    </button>
  );
}

function JobsCard({ filter, setFilter, pages, selectedNum, onSelect }) {
  const [expanded, setExpanded] = useState(true);
  const counts = useMemo(() => {
    const c = { all: pages.length, running: 0, queued: 0, done: 0, errored: 0, review: 0 };
    pages.forEach(p => { c[p.status] = (c[p.status] || 0) + 1; });
    return c;
  }, [pages]);
  const filtered = filter === 'all' ? pages : pages.filter(p => p.status === filter);
  const totalDone = pages.filter(p => p.status === 'done' || p.status === 'review').length;

  return (
    <div className="bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden">
      {/* parent row */}
      <div className="grid grid-cols-[1fr_220px_140px_110px] items-center gap-4 px-5 py-3.5 border-b border-slate-200">
        <div className="flex items-center gap-3 min-w-0">
          <button
            onClick={() => setExpanded(e => !e)}
            className="h-7 w-7 inline-flex items-center justify-center rounded-md border border-slate-200 hover:bg-slate-50 text-slate-600"
            aria-label={expanded ? 'Collapse' : 'Expand'}
          >
            <Icon name={expanded ? 'chevron-down' : 'chevron-right'} className="w-4 h-4" />
          </button>
          <div className="min-w-0">
            <div className="flex items-center gap-2">
              <h3 className="text-sm font-semibold text-slate-900">Run all dirty stages</h3>
              <code className="text-[11px] font-mono text-slate-500 bg-slate-50 px-1.5 py-0.5 rounded">project_run_dirty</code>
            </div>
            <div className="text-xs text-slate-500 mt-0.5">started 2m ago · 47 pages · mara@</div>
          </div>
        </div>
        <Progress value={totalDone} total={47} tone="default" />
        <Badge kind="running" />
        <div className="flex items-center justify-end gap-1">
          <Button variant="ghost" size="icon" className="h-8 w-8 text-slate-500" title="Logs">
            <Icon name="logs" className="w-4 h-4" />
          </Button>
          <Button variant="ghost" size="icon" className="h-8 w-8 text-slate-500" title="More">
            <Icon name="more-horizontal" className="w-4 h-4" />
          </Button>
        </div>
      </div>

      {/* filter row */}
      {expanded && (
        <div className="px-5 py-2.5 border-b border-slate-200 bg-slate-50/60 flex items-center gap-2 flex-wrap">
          <div className="flex items-center gap-1.5 text-xs text-slate-500 mr-1">
            <Icon name="list-filter" className="w-3.5 h-3.5" />
            <span>Filter</span>
          </div>
          {FILTERS.map(f => {
            const active = filter === f.id;
            const n = counts[f.id] ?? 0;
            return (
              <button
                key={f.id}
                onClick={() => setFilter(f.id)}
                className={`inline-flex items-center gap-1.5 h-7 px-2.5 rounded-md text-xs font-medium border transition-colors ${
                  active
                    ? 'bg-slate-900 text-white border-slate-900'
                    : 'bg-white text-slate-700 border-slate-200 hover:bg-slate-100'
                }`}
              >
                {f.label}
                <span className={`tabular-nums ${active ? 'text-slate-300' : 'text-slate-400'}`}>{n}</span>
              </button>
            );
          })}
          <div className="ml-auto text-xs text-slate-500">
            Showing <span className="font-medium text-slate-700">{filtered.length}</span> of {pages.length}
          </div>
        </div>
      )}

      {/* page list */}
      {expanded && (
        <div className="max-h-[440px] overflow-y-auto scrollbar-thin">
          {filtered.length === 0 ? (
            <div className="px-5 py-12 text-center text-sm text-slate-500">
              No pages match this filter.
            </div>
          ) : (
            filtered.map(p => (
              <PageRow
                key={p.num}
                page={p}
                selected={selectedNum === p.num}
                onClick={() => onSelect(p)}
              />
            ))
          )}
        </div>
      )}
    </div>
  );
}

// ───────────────────────────────────────────────────────────────────────────
// page drawer (right rail)
// ───────────────────────────────────────────────────────────────────────────

function PageDrawer({ page, onClose, onMarkReviewed }) {
  if (!page) return null;
  const doneCount = page.cells.filter(c => c === 'done').length;
  const meta = STATUS_META[page.status];
  return (
    <aside className="bg-white border border-slate-200 rounded-lg shadow-sm sticky top-6 max-h-[calc(100vh-3rem)] overflow-hidden flex flex-col">
      <div className="px-5 py-3.5 border-b border-slate-200 flex items-start justify-between">
        <div className="min-w-0">
          <div className="flex items-center gap-2">
            <h3 className="text-base font-semibold text-slate-900">Page {page.num}</h3>
            <Badge kind={page.status} />
          </div>
          <div className="text-xs font-mono text-slate-500 mt-0.5 truncate">{page.file}</div>
        </div>
        <button
          onClick={onClose}
          className="h-7 w-7 inline-flex items-center justify-center rounded-md text-slate-500 hover:bg-slate-100"
          aria-label="Close"
        >
          <Icon name="x" className="w-4 h-4" />
        </button>
      </div>

      <div className="flex-1 overflow-y-auto scrollbar-thin">
        <div className="px-5 py-4 border-b border-slate-100">
          <div className="text-[11px] font-medium tracking-wider text-slate-500 uppercase mb-2">Overall</div>
          <Progress value={doneCount} total={4} tone={page.status === 'errored' ? 'red' : page.status === 'running' ? 'blue' : 'emerald'} />
          <div className="text-xs text-slate-500 mt-2">
            {page.startedAt ? <>Started <span className="font-medium text-slate-700">{page.startedAt}</span></> : 'Not started yet'}
          </div>
        </div>

        <div className="px-5 py-4 border-b border-slate-100">
          <div className="text-[11px] font-medium tracking-wider text-slate-500 uppercase mb-2.5">Stages</div>
          <div className="space-y-2">
            {STAGES.map((s, i) => {
              const kind = page.cells[i];
              const m = CELL_META[kind];
              return (
                <div key={s} className="flex items-center justify-between gap-3 py-1.5">
                  <div className="flex items-center gap-2.5 min-w-0">
                    <StageCell kind={kind} />
                    <span className="text-sm font-mono text-slate-700">{s}</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className="text-xs text-slate-500 font-mono tabular-nums">
                      {kind === 'done' ? `${page.durations[i]}s` : kind === 'running' ? 'running…' : kind === 'err' ? 'failed' : '—'}
                    </span>
                    {kind === 'err' && (
                      <Button variant="outline" size="xs"><Icon name="rotate-ccw" className="w-3 h-3" />Retry</Button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
          {page.status === 'errored' && (
            <div className="mt-3 px-3 py-2 bg-red-50 border border-red-100 rounded-md">
              <div className="text-xs font-mono text-red-700">
                {page.cells.indexOf('err') === 0 ? 'ocr · timeout after 60s' : 'segment · ValueError: empty mask'}
              </div>
            </div>
          )}
        </div>

        {page.status === 'review' && (
          <div className="px-5 py-4 border-b border-slate-100 bg-amber-50/50">
            <div className="text-[11px] font-medium tracking-wider text-amber-700 uppercase mb-2">Review needed</div>
            <div className="text-sm text-slate-700">
              Flagged because <span className="font-medium">ocr confidence &lt; 0.82</span> on 3 regions.
            </div>
            <div className="flex items-center gap-2 mt-3">
              <Button variant="amber" size="sm" onClick={() => onMarkReviewed(page)}>
                <Icon name="eye" className="w-3.5 h-3.5" />Open in workbench
              </Button>
              <Button variant="outline" size="sm" onClick={() => onMarkReviewed(page)}>
                Mark reviewed
              </Button>
            </div>
          </div>
        )}

        <div className="px-5 py-4">
          <div className="text-[11px] font-medium tracking-wider text-slate-500 uppercase mb-2">Actions</div>
          <div className="flex flex-wrap gap-2">
            <Button variant="outline" size="sm"><Icon name="logs" className="w-3.5 h-3.5" />View logs</Button>
            <Button variant="outline" size="sm"><Icon name="refresh" className="w-3.5 h-3.5" />Re-run page</Button>
            <Button variant="ghost" size="sm" className="text-red-700 hover:bg-red-50">Skip page</Button>
          </div>
        </div>
      </div>
    </aside>
  );
}

// ───────────────────────────────────────────────────────────────────────────
// project header + tabs
// ───────────────────────────────────────────────────────────────────────────

function ProjectHeader({ stats, onRunDirty, onBuildPackage, packageGated }) {
  return (
    <div>
      <div className="flex items-center gap-2 text-xs text-slate-500 mb-2">
        <Icon name="folder" className="w-3.5 h-3.5" />
        <a href="#" className="hover:text-slate-700">Projects</a>
        <span>/</span>
        <span className="text-slate-700">willa-cather-letters</span>
      </div>
      <div className="flex items-end justify-between gap-6 flex-wrap">
        <div>
          <h1 className="text-2xl font-semibold tracking-tight text-slate-900">willa-cather-letters</h1>
          <div className="text-sm text-slate-500 mt-1">
            47 pages · created Mar 02, 2026 · owner <span className="font-mono">mara@</span>
          </div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <Button variant="outline">
            <Icon name="refresh" className="w-4 h-4" />Re-import scans
          </Button>
          <Button variant="secondary" onClick={onRunDirty}>
            <Icon name="play" className="w-4 h-4" />Run all dirty stages
            <span className="font-mono text-xs text-slate-500 ml-0.5">({stats.dirty})</span>
          </Button>
          <div className="relative">
            <Button variant="default" disabled={packageGated} onClick={onBuildPackage}>
              <Icon name="package" className="w-4 h-4" />Build package
            </Button>
            {packageGated && (
              <span className="absolute -top-1.5 -right-1.5 w-3 h-3 rounded-full bg-amber-500 ring-2 ring-white" title="Parked"></span>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function StatTile({ value, label, sub, tone }) {
  const toneCls = {
    default: 'text-slate-900',
    amber: 'text-amber-600',
    blue: 'text-blue-600',
    emerald: 'text-emerald-600',
  }[tone || 'default'];
  return (
    <div className="px-5 py-4">
      <div className={`text-2xl font-semibold tabular-nums ${toneCls}`}>{value}</div>
      <div className="text-xs font-medium tracking-wide text-slate-500 uppercase mt-1">{label}</div>
      {sub && <div className="text-xs text-slate-500 mt-1">{sub}</div>}
    </div>
  );
}

// ───────────────────────────────────────────────────────────────────────────
// app
// ───────────────────────────────────────────────────────────────────────────

function App() {
  const [pages, setPages] = useState(PAGES);
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(pages.find(p => p.status === 'review') || null);
  const [bannerDismissed, setBannerDismissed] = useState(false);

  const unreviewed = pages.filter(p => p.status === 'review');
  const stats = useMemo(() => ({
    total: pages.length,
    dirty: pages.filter(p => p.status !== 'done').length,
    review: pages.filter(p => p.status === 'review').length,
    ready: pages.filter(p => p.status === 'done').length,
  }), [pages]);

  function markReviewed(page) {
    setPages(prev => prev.map(p => p.num === page.num ? { ...p, status: 'done' } : p));
    setSelected(null);
  }

  function reviewNext() {
    const next = unreviewed[0];
    if (next) {
      setSelected(next);
      setFilter('review');
    }
  }

  return (
    <div className="min-h-screen bg-slate-50">
      <TopNav unreviewed={unreviewed} onSelectPage={(p) => { setSelected(p); setFilter('review'); }} />

      <main className="max-w-[1440px] mx-auto px-6 py-6 space-y-6">
        <ProjectHeader
          stats={stats}
          onRunDirty={() => {}}
          onBuildPackage={() => {}}
          packageGated={stats.review > 0}
        />

        {/* stats */}
        <div className="bg-white border border-slate-200 rounded-lg shadow-sm divide-x divide-slate-200 grid grid-cols-4">
          <StatTile value={stats.total} label="Total pages" sub="scan_0001 → scan_0047" />
          <StatTile value={stats.dirty} label="Dirty pages" sub="stages out-of-date" tone="blue" />
          <StatTile value={stats.review} label="Awaiting review" sub="blocking build_package" tone="amber" />
          <StatTile value={stats.ready} label="Ready" sub="all stages green" tone="emerald" />
        </div>

        {/* banner */}
        {stats.review > 0 && !bannerDismissed && (
          <ReviewBanner
            count={stats.review}
            onReviewNext={reviewNext}
            onDismiss={() => setBannerDismissed(true)}
          />
        )}

        {/* tabs (visual only, jobs is active) */}
        <div className="border-b border-slate-200">
          <nav className="flex gap-1 -mb-px">
            {['Overview', 'Jobs', 'Pages', 'Settings'].map((t, i) => (
              <a
                key={t} href="#"
                className={`px-4 py-2.5 text-sm border-b-2 transition-colors ${
                  i === 1
                    ? 'border-slate-900 text-slate-900 font-medium'
                    : 'border-transparent text-slate-500 hover:text-slate-700'
                }`}
              >
                {t}
                {i === 1 && <span className="ml-2 text-xs font-mono text-slate-400">3</span>}
              </a>
            ))}
          </nav>
        </div>

        {/* jobs + drawer */}
        <div className={`grid gap-6 ${selected ? 'grid-cols-1 xl:grid-cols-[minmax(0,1fr)_420px]' : 'grid-cols-1'}`}>
          <JobsCard
            filter={filter}
            setFilter={setFilter}
            pages={pages}
            selectedNum={selected?.num}
            onSelect={setSelected}
          />
          {selected && (
            <PageDrawer
              page={selected}
              onClose={() => setSelected(null)}
              onMarkReviewed={markReviewed}
            />
          )}
        </div>

        <footer className="pt-6 pb-12 flex items-center justify-between text-xs text-slate-500 border-t border-slate-200">
          <div>pgdp-prep · M5 hi-fi prototype</div>
          <div className="flex items-center gap-3">
            <span>Tip: click any page row to open the drawer</span>
            <span>·</span>
            <span>Click the bell to see open tasks</span>
          </div>
        </footer>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
